<html>
 <head>
  <link id="theme" rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=chat_bubble,equalizer,mindfulness">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
</head> 
 <body>
  <img src="evening theme.jpg" class="Background">
    <div class="features"> 
     <span class="material-symbols-outlined " id="chat">chat_bubble</span>
     <span class="material-symbols-outlined" id="stat">
     equalizer  
     </span>
     <span class="material-symbols-outlined" id="cher">
      mindfulness
     </span>
    </div>
    <div class="Buttons">
     <button class="Morn">
       Morning
     </button> 
     <button class="Evening">
       Evening
     </button>
     <button class="Night">
      Night
     </button>
    </div>
    <div class="Timer"> 
     <div class="Hours"> 00 </div>
     <div> : </div>
     <div class="Minutes"> 00 </div>
     <div>: </div>
     <div class="Seconds"> 00 </div>
    </div> 
    <button class="Settimer"> Set timer </button>
    <button class="Start"> Start timer  </button>
     <script src="Timer.js"> </script>
     <script src="productivity.js"> </script>
    
 </body>




















</html>
